<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Commande de Fruits</title>
    <style>
        /* ===========================
           Styles généraux
        =========================== */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(to bottom, #e6ffe6, #ccffcc);
            text-align: center;
            margin: 0;
            padding: 0;
        }

        h1 {
            background: #28a745;
            color: white;
            padding: 25px 0;
            margin: 0;
            font-size: 2.2em;
            font-weight: bold;
            letter-spacing: 1px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        h2 {
            color: #19692c;
            font-size: 1.6em;
            margin-top: 30px;
            margin-bottom: 20px;
            border-bottom: 2px solid #28a745;
            display: inline-block;
            padding-bottom: 5px;
            transition: color 0.3s; /* effet hover */
        }

        h2:hover { color: #28a745; }

        .categorie {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
        }

        .produit {
            background: white;
            padding: 25px;
            width: 340px;
            border-radius: 20px;
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
            transition: transform 0.3s, box-shadow 0.3s, opacity 1s;
            opacity: 0;
            animation: fadeIn 0.8s forwards;
        }

        .produit:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 20px rgba(0,0,0,0.25);
        }

        .animate {
            animation: pop 0.3s ease;
        }

        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.08); }
            100% { transform: scale(1); }
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        .fruit-img {
            width: 100%;
            max-width: 200px;
            height: auto;
            border-radius: 15px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .fruit-img:hover { transform: scale(1.05); }

        .produit h3 { margin: 0 0 10px 0; font-size: 1.4em; color: #155724; }
        .produit p { margin: 5px 0 15px 0; font-size: 1.1em; color: #555; }

        .quantite-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-top: 10px;
        }

        input[type=number] {
            width: 60px;
            padding: 6px;
            font-size: 1em;
            border-radius: 6px;
            border: 1px solid #ccc;
            text-align: center;
            transition: border 0.2s;
        }

        input[type=number]:focus { border: 2px solid #28a745; outline: none; }

        .btn-quantite {
            padding: 6px 12px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1em;
            transition: background 0.2s, transform 0.2s;
        }

        .btn-quantite:hover { background: #218838; transform: scale(1.1); }

        button {
            background: #28a745;
            color: white;
            border: none;
            padding: 18px 35px;
            cursor: pointer;
            border-radius: 12px;
            font-size: 1.2em;
            font-weight: bold;
            margin: 20px 0 40px 0;
            transition: background 0.3s, transform 0.3s, box-shadow 0.3s;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        button:hover { background: #218838; transform: scale(1.05); box-shadow: 0 8px 16px rgba(0,0,0,0.3); }

        #total { font-size: 1.4em; color: #155724; font-weight: bold; margin: 20px 0; }

        /* Compteur sur image */
        .compteur {
            position: absolute;
            top: 5px;
            right: 5px;
            background: #28a745;
            color: white;
            font-weight: bold;
            border-radius: 50%;
            padding: 5px 10px;
            font-size: 1em;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
            pointer-events: none;
        }

        .img-container { position: relative; display: inline-block; }

        /* Animation pulse */
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.4); }
            100% { transform: scale(1); }
        }

        .compteur.pulse { animation: pulse 0.3s ease; }
    </style>
</head>
<body>
    <h1>🍍 Commande de Fruits</h1>

    <h2>Fruits Tropicaux</h2>
    <div class="categorie">
        <!-- Banane -->
        <div class="produit" id="banane-card">
            <div class="img-container">
                <img src="banane.jpg" alt="Banane" class="fruit-img" onclick="ajouterQuantite('banane')">
                <span class="compteur" id="compteur-banane">0</span>
            </div>
            <h3>Banane</h3>
            <p>500 FCFA / kg</p>
            <div class="quantite-container">
                <button class="btn-quantite" onclick="retirerQuantite('banane')">-</button>
                <input type="number" id="banane" value="0">
                <button class="btn-quantite" onclick="ajouterQuantite('banane')">+</button>
            </div>
        </div>
        <!-- Ananas -->
        <div class="produit" id="ananas-card">
            <div class="img-container">
                <img src="ananas.jpg" alt="Ananas" class="fruit-img" onclick="ajouterQuantite('ananas')">
                <span class="compteur" id="compteur-ananas">0</span>
            </div>
            <h3>Ananas</h3>
            <p>1000 FCFA / pièce</p>
            <div class="quantite-container">
                <button class="btn-quantite" onclick="retirerQuantite('ananas')">-</button>
                <input type="number" id="ananas" value="0">
                <button class="btn-quantite" onclick="ajouterQuantite('ananas')">+</button>
            </div>
        </div>
        <!-- Mangue -->
        <div class="produit" id="mangue-card">
            <div class="img-container">
                <img src="mangue.jpg" alt="Mangue" class="fruit-img" onclick="ajouterQuantite('mangue')">
                <span class="compteur" id="compteur-mangue">0</span>
            </div>
            <h3>Mangue</h3>
            <p>800 FCFA / kg</p>
            <div class="quantite-container">
                <button class="btn-quantite" onclick="retirerQuantite('mangue')">-</button>
                <input type="number" id="mangue" value="0">
                <button class="btn-quantite" onclick="ajouterQuantite('mangue')">+</button>
            </div>
        </div>
    </div>

    <h2>Agrumes</h2>
    <div class="categorie">
        <!-- Orange -->
        <div class="produit" id="orange-card">
            <div class="img-container">
                <img src="orange.jpg" alt="Orange" class="fruit-img" onclick="ajouterQuantite('orange')">
                <span class="compteur" id="compteur-orange">0</span>
            </div>
            <h3>Orange</h3>
            <p>600 FCFA / kg</p>
            <div class="quantite-container">
                <button class="btn-quantite" onclick="retirerQuantite('orange')">-</button>
                <input type="number" id="orange" value="0">
                <button class="btn-quantite" onclick="ajouterQuantite('orange')">+</button>
            </div>
        </div>
        <!-- Pamplemousse -->
        <div class="produit" id="pamplemousse-card">
            <div class="img-container">
                <img src="pamplemousse.jpg" alt="Pamplemousse" class="fruit-img" onclick="ajouterQuantite('pamplemousse')">
                <span class="compteur" id="compteur-pamplemousse">0</span>
            </div>
            <h3>Pamplemousse</h3>
            <p>900 FCFA / pièce</p>
            <div class="quantite-container">
                <button class="btn-quantite" onclick="retirerQuantite('pamplemousse')">-</button>
                <input type="number" id="pamplemousse" value="0">
                <button class="btn-quantite" onclick="ajouterQuantite('pamplemousse')">+</button>
            </div>
        </div>
    </div>

    <p id="total">Total : 0 FCFA</p>
    <button onclick="commander()">Commander sur WhatsApp</button>

    <script>
        let prix = { banane:500, ananas:1000, mangue:800, orange:600, pamplemousse:900 };

        function calculerTotal() {
            let total = 0;
            for (let fruit in prix) {
                let q = parseInt(document.getElementById(fruit).value) || 0;
                total += q * prix[fruit];
            }
            document.getElementById("total").innerText = "Total : " + total + " FCFA";
            return total;
        }

        function pulseCompteur(id) {
            let badge = document.getElementById("compteur-" + id);
            badge.classList.remove("pulse");
            void badge.offsetWidth;
            badge.classList.add("pulse");
        }

        function ajouterQuantite(id) {
            let input = document.getElementById(id);
            input.value = parseInt(input.value || 0) + 1;
            animateCard(id);
            document.getElementById("compteur-" + id).innerText = input.value;
            pulseCompteur(id);
            calculerTotal();
        }

        function retirerQuantite(id) {
            let input = document.getElementById(id);
            if (parseInt(input.value || 0) > 0) {
                input.value = parseInt(input.value) - 1;
                animateCard(id);
                document.getElementById("compteur-" + id).innerText = input.value;
                pulseCompteur(id);
                calculerTotal();
            }
        }

        function animateCard(id) {
            let card = document.getElementById(id + "-card");
            card.classList.remove("animate");
            void card.offsetWidth;
            card.classList.add("animate");
        }

        let inputs = document.querySelectorAll('input[type=number]');
        inputs.forEach(input => input.addEventListener('input', () => {
            animateCard(input.id);
            document.getElementById("compteur-" + input.id).innerText = input.value || 0;
            pulseCompteur(input.id);
            calculerTotal();
        }));

        function commander() {
            let message = "Bonjour, je veux commander :%0A";
            for (let fruit in prix) {
                let q = document.getElementById(fruit).value;
                if (q > 0) message += "- " + capitalize(fruit) + ": " + q + "%0A";
            }
            message += "Total à payer : " + calculerTotal() + " FCFA";
            let numero = "2250152404244"; 
            let url = "https://wa.me/" + numero + "?text=" + message;
            window.open(url, "_blank");
        }

        function capitalize(str) {
            return str.charAt(0).toUpperCase() + str.slice(1);
        }
    </script>
</body>
</html>
