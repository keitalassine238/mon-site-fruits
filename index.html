<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Commande de Fruits</title>

<!-- ============================
     Styles CSS pour le site
============================ -->
<style>
    /* Style général du corps de la page */
    body {
        font-family: sans-serif;
        text-align: center;
        background: #e6ffe6;
        margin: 0;
        padding: 0;
    }

    /* Style du titre principal */
    h1 {
        background: #28a745;
        color: white;
        padding: 20px;
        margin: 0;
    }

    /* Container pour les catégories de fruits (flexbox pour aligner les cartes) */
    .categorie {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 20px;
        margin: 20px;
    }

    /* Style de chaque carte de fruit */
    .produit {
        background: white;
        padding: 15px;
        width: 220px;
        border-radius: 15px;
        box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    }

    /* Style de l'image du fruit */
    .fruit-img {
        width: 100%;
        cursor: pointer; /* Change le curseur pour indiquer que c'est cliquable */
        border-radius: 10px;
    }

    /* Container pour les boutons + / - et input de quantité */
    .quantite-container {
        margin-top: 10px;
        display: flex;
        justify-content: center;
        gap: 5px;
    }

    /* Style des boutons de quantité */
    .btn-quantite {
        padding: 5px 10px;
        background: #28a745;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
    }

    .btn-quantite:hover {
        background: #218838;
    }

    /* Style pour le total */
    #total {
        font-weight: bold;
        margin-top: 20px;
        font-size: 1.2em;
    }
</style>
</head>
<body>

<!-- ============================
        Titre principal
============================ -->
<h1>🍍 Commande de Fruits</h1>

<!-- ============================
     Container pour les fruits
     Les cartes seront générées via JavaScript
============================ -->
<div class="categorie" id="fruits-container">
</div>

<!-- Total de la commande -->
<p id="total">Total : 0 FCFA</p>

<!-- Bouton pour commander sur WhatsApp -->
<button onclick="commander()">Commander sur WhatsApp</button>

<!-- ============================
     Script JavaScript
     Pour gérer les fruits, quantités et total
============================ -->
<script>
/* Tableau contenant les informations de tous les fruits */
const fruits = [
    {id:"banane", nom:"Banane", prix:500, unite:"kg", image:"banane.jpg"},
    {id:"ananas", nom:"Ananas", prix:1000, unite:"pièce", image:"ananas.jpg"},
    {id:"mangue", nom:"Mangue", prix:800, unite:"kg", image:"mangue.jpg"},
    {id:"orange", nom:"Orange", prix:600, unite:"kg", image:"orange.jpg"},
    {id:"pamplemousse", nom:"Pamplemousse", prix:900, unite:"pièce", image:"pamplemousse.jpg"}
];

/* Génération dynamique des cartes de fruits dans le container */
const container = document.getElementById('fruits-container');
fruits.forEach(fruit => {
    const card = document.createElement('div'); // Création de la div carte
    card.className = 'produit'; // Ajout de la classe produit
    card.innerHTML = `
        <!-- Image cliquable pour augmenter la quantité -->
        <img src="${fruit.image}" class="fruit-img" onclick="ajouterQuantite('${fruit.id}')">
        <h3>${fruit.nom}</h3>
        <p>${fruit.prix} FCFA / ${fruit.unite}</p>

        <!-- Boutons + / - et input -->
        <div class="quantite-container">
            <button class="btn-quantite" onclick="retirerQuantite('${fruit.id}')">-</button>
            <input type="number" id="${fruit.id}" value="0" style="width:50px;text-align:center;">
            <button class="btn-quantite" onclick="ajouterQuantite('${fruit.id}')">+</button>
        </div>
    `;
    container.appendChild(card); // Ajout de la carte dans le container
});

/* ============================
     Fonction pour calculer le total
============================ */
function calculerTotal() {
    let total = 0;
    fruits.forEach(f => {
        const q = parseInt(document.getElementById(f.id).value) || 0; // Récupère la quantité
        total += q * f.prix; // Ajoute au total
    });
    document.getElementById('total').innerText = "Total : " + total + " FCFA"; // Met à jour l'affichage
    return total;
}

/* ============================
     Fonctions pour ajouter / retirer quantité
============================ */
function ajouterQuantite(id) {
    const input = document.getElementById(id);
    input.value = parseInt(input.value || 0) + 1; // Incrémente la quantité
    calculerTotal(); // Met à jour le total
}

function retirerQuantite(id) {
    const input = document.getElementById(id);
    if(parseInt(input.value) > 0) {
        input.value = parseInt(input.value) - 1; // Décrémente la quantité
        calculerTotal(); // Met à jour le total
    }
}

/* ============================
     Fonction pour commander sur WhatsApp
============================ */
function commander() {
    let message = "Bonjour, je veux commander :%0A"; // Message de base
    fruits.forEach(f => {
        const q = parseInt(document.getElementById(f.id).value) || 0;
        if(q > 0) message += `- ${f.nom} : ${q} ${f.unite}%0A`; // Ajoute chaque fruit commandé
    });
    message += "Total à payer : " + calculerTotal() + " FCFA"; // Ajoute le total
    const numero = "2250152404244"; // Ton numéro WhatsApp
    window.open("https://wa.me/" + numero + "?text=" + message, "_blank"); // Ouvre WhatsApp
}
</script>

</body>
</html>
